<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 150 150" fill="none">
  <!-- Gradient definitions -->
  <defs>
    <!-- Top Block gradients-->
    <linearGradient id="gradient-1-top" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50E0E5" />
      <stop offset="100%" style="stop-color:#007080" />
    </linearGradient>
    <linearGradient id="gradient-1-side" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40C0B5" />
      <stop offset="100%" style="stop-color:#005060" />
    </linearGradient>
    <linearGradient id="gradient-1-front" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004055" />
      <stop offset="100%" style="stop-color:#004075" />
    </linearGradient>

    <!-- Middle Block gradients-->
    <linearGradient id="gradient-2-top" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40B0B5" />
      <stop offset="100%" style="stop-color:#004565" />
    </linearGradient>
    <linearGradient id="gradient-2-side" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#008085" />
      <stop offset="100%" style="stop-color:#004060" />
    </linearGradient>
    <linearGradient id="gradient-2-front" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003050" />
      <stop offset="100%" style="stop-color:#004070" />
    </linearGradient>

    <!-- Bottom Block gradients-->
    <linearGradient id="gradient-3-top" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0080A0" />
      <stop offset="100%" style="stop-color:#001545" />
    </linearGradient>
    <linearGradient id="gradient-3-side" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#005580" />
      <stop offset="100%" style="stop-color:#001545" />
    </linearGradient>
    <linearGradient id="gradient-3-front" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001030" />
      <stop offset="100%" style="stop-color:#001530" />
    </linearGradient>
  </defs>
  <!-- Bottom Block -->
    <!-- Top face -->
    <polygon points="95,70 135,90 55,130 15,110" fill="url(#gradient-3-top)"/>
    <!-- Front face -->
    <polygon points="15,110 55,130 55,150 15,130" fill="url(#gradient-3-front)"/>
    <!-- Right face -->
    <polygon points="55,130 135,90 135,110 55,150" fill="url(#gradient-3-side)"/>
  <!-- Middle Block -->
    <!-- Top face -->
    <polygon points="95,35 135,55 55,95 15,75" fill="url(#gradient-2-top)"/>
    <!-- Front face -->
    <polygon points="15,75 55,95 55,115 15,95" fill="url(#gradient-2-front)"/>
    <!-- Right face -->
    <polygon points="55,95 135,55 135,75 55,115" fill="url(#gradient-2-side)"/>
  <!-- Top Block -->
    <!-- Top face -->
    <polygon points="95,0 135,20 55,60 15,40" fill="url(#gradient-1-top)"/>
    <!-- Front face -->
    <polygon points="15,40 55,60 55,80 15,60" fill="url(#gradient-1-front)"/>
    <!-- Right face -->
    <polygon points="55,60 135,20 135,40 55,80" fill="url(#gradient-1-side)"/>
</svg>